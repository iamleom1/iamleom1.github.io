<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>R4V3 Support</title>
  <meta name="description" content="R4V3 support, privacy policy, and terms." />
  <style>
    :root {
      --bg: #060607;
      --panel: #101114;
      --text: #f7f3ec;
      --muted: rgba(247,243,236,0.72);
      --line: rgba(255,255,255,0.10);
      --accent: #ff6a2a;
      --accent-soft: rgba(255,106,42,0.16);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at 15% 30%, rgba(94,56,255,0.16), transparent 30%),
        radial-gradient(circle at 85% 25%, rgba(255,106,42,0.20), transparent 28%),
        var(--bg);
      color: var(--text);
    }
    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 20px;
    }
    .card {
      width: min(760px, 100%);
      background: rgba(16,17,20,0.86);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      font-size: clamp(32px, 5vw, 56px);
      letter-spacing: 1px;
    }
    .dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: var(--accent);
      margin-top: 6px;
    }
    h1 {
      margin: 22px 0 10px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.02;
      letter-spacing: -0.03em;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
    }
    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-top: 28px;
    }
    a.link {
      display: block;
      padding: 18px 20px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
    }
    a.link small {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
    }
    a.link:hover { border-color: rgba(255,106,42,0.45); background: var(--accent-soft); }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="brand">R4V3 <span class="dot"></span></div>
      <h1>Support and policy resources</h1>
      <p>Public support, privacy, and terms pages for the R4V3 iOS app.</p>
      <div class="links">
        <a class="link" href="/support.html">Support<small>Help, account deletion, and safety contact guidance</small></a>
        <a class="link" href="/privacy.html">Privacy Policy<small>What data R4V3 collects and how it is used</small></a>
        <a class="link" href="/terms.html">Terms of Service<small>Rules, eligibility, moderation, and service terms</small></a>
      </div>
    </section>
  </main>
</body>
</html>
